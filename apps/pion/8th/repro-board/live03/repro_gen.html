<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { background:#fff; }
.page {
  position:relative;
  width:2480px; height:3508px;
  background:#ffffff;
  font-family:'Pretendard', sans-serif;
  color:#1a1a1a;
  overflow:hidden;
}
.hero { position:absolute; left:0; top:0; width:2480px; height:2304px; }
.hero img { width:100%; height:100%; display:block; }

/* top-right label: ink target x..2275, y 94-162 */
.season-label {
  position:absolute; top:96px; right:194px;
  display:flex; align-items:center; gap:34px;
  height:68px;
}
.season-label .dash { width:141px; height:5px; background:#1f1f1f; }
.season-label .txt {
  font-size:78px; font-weight:500; letter-spacing:0.055em;
  color:#1f1f1f; line-height:1;
}

/* AIRMADE logo: ink x208, y2130-2207 (cap 77, width 552) */
.logo {
  position:absolute; left:208px; top:2136px;
  font-family:'Montserrat', sans-serif;
  font-size:114px; font-weight:800; letter-spacing:0.09em;
  color:#242424; line-height:0.75;
}

/* circle insert: center (1962,2307), inner r398, ring 53 -> outer 454 to cover baked ring */
.circle {
  position:absolute; left:1508px; top:1853px;
  width:908px; height:908px;
  border-radius:50%;
  border:56px solid #ffffff;
  overflow:hidden;
  background:#fff;
}
.circle img { width:796px; height:796px; display:block; }

/* white info zone */
.model {
  position:absolute; left:207px; top:2474px;
  font-size:70px; font-weight:700; letter-spacing:0.005em; line-height:1;
  color:#191919;
}
.title {
  position:absolute; left:200px; top:2592px;
  font-size:137px; font-weight:800; letter-spacing:0.005em; line-height:1;
  color:#191919;
}
.hashes {
  position:absolute; left:205px; top:2803px;
  font-size:94px; font-weight:400; letter-spacing:-0.015em; line-height:120px;
  color:#191919;
}
.hashes .em { display:inline-block; transform:skewX(-8deg); font-weight:400; }
.divider {
  position:absolute; left:207px; top:3227px;
  width:1777px; height:5px; background:#151515;
}
.divider .dot {
  position:absolute; right:-10px; top:50%;
  width:20px; height:20px; margin-top:-10px;
  border-radius:50%; background:#151515;
}
.brand {
  position:absolute; left:0; top:3328px; width:2480px;
  text-align:center;
  font-size:72px; font-weight:400; letter-spacing:0.02em; line-height:1;
  color:#191919;
}
.brand b { font-weight:700; }
</style>
</head>
<body>
<div class="page">
  <div class="hero"><img src="gen_hero.png" alt=""></div>

  <div class="season-label">
    <div class="dash"></div>
    <div class="txt">계절가전</div>
  </div>

  <div class="logo">AIRMADE</div>

  <div class="circle"><img src="gen_circle.png" alt=""></div>

  <div class="model">AMF-1570C</div>
  <div class="title">더 위대한 선풍기</div>
  <div class="hashes">
    <div># 배터리 분리형_배터리 수명 걱정 <span class="em">NO!</span></div>
    <div>#냉방비 걱정없는 3차원 공기 순환</div>
  </div>
  <div class="divider"><div class="dot"></div></div>
  <div class="brand">프리미엄 생활가전 브랜드_<b>에어메이드</b></div>
</div>
</body>
</html>
