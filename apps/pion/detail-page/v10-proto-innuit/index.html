<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>버전 비교 — AIR 슬리퍼</title>
<style>
:root{--line:#e3e3e8;--mut:#8a8a93;--ink:#1a1a22;--ac:#b08d57}
*{margin:0;padding:0;box-sizing:border-box} body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f4f4f6;color:var(--ink);line-height:1.4}
.hd{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.98);border-bottom:1px solid var(--line);padding:9px 14px;display:flex;align-items:center;gap:12px}
.hd h1{font-size:13px;font-weight:700} .hd button{font-size:11px;padding:5px 11px;border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer} .hd button.on{background:var(--ink);color:#fff}
.board{display:flex;gap:11px;padding:13px;overflow-x:auto;align-items:flex-start}
.lane{flex:0 0 240px;width:240px}
.lh{background:#fff;border:1px solid var(--line);border-radius:9px;padding:6px 8px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:5px}
.lh b{font-size:12px} .lh span{display:block;font-size:9.5px;color:var(--mut)} .lh.v b{color:var(--ac)} .lh.p b{color:#2a7} .lh.ref b{color:#c0392b} .lh.d b{color:#999}
.mv button{font-size:10px;padding:2px 5px;border:1px solid var(--line);background:#faf6ef;border-radius:5px;cursor:pointer;margin-left:2px}
.stack{display:flex;flex-direction:column}
.cell{border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:7px;background:#fff} .cell img{width:100%;display:block}
.cap{padding:4px 7px;font-size:9.5px;color:#555;border-top:1px solid var(--line)} .cap b{color:var(--ac)} .cap .rf{color:#aaa}
/* 기본 seamless: 캡션 숨김 + 카드 다 붙음 */
body.seamless .cap{display:none} body.seamless .cell{border:0;border-radius:0;margin-bottom:0}
</style></head><body class="seamless">
<div class="hd"><h1>버전 비교 — AIR 슬리퍼 (무신사 / v10 / v8·v8-2·v9 / 원본)</h1>
<button id="tb" onclick="document.body.classList.toggle('seamless');this.classList.toggle('on')">캡션·경계 표시</button>
<span style="font-size:10.5px;color:#8a8a93">기본=붙여보기 · 버튼=조각보기 · ◀▶ 레인 이동</span></div>
<div class="board" id="board"><div class="lane"><div class="lh ref"><div><b>무신사 원본+컷</b><span>82조각→38섹션</span></div><div class="mv"><button onclick="mv(this,-1)">◀</button><button onclick="mv(this,1)">▶</button></div></div><div class="stack"><img src="assets/source-group-v4.jpg" style="width:100%;display:block"></div></div><div class="lane"><div class="lh d"><div><b>v10·DS=v9</b><span>복사(딜드)</span></div><div class="mv"><button onclick="mv(this,-1)">◀</button><button onclick="mv(this,1)">▶</button></div></div><div class="stack"><div class="cell" style="padding:20px;text-align:center;color:#999">없음</div></div></div><div class="lane"><div class="lh d"><div><b>v10·DS=무신사</b><span>복사(딜드)</span></div><div class="mv"><button onclick="mv(this,-1)">◀</button><button onclick="mv(this,1)">▶</button></div></div><div class="stack"><div class="cell" style="padding:20px;text-align:center;color:#999">없음</div></div></div><div class="lane"><div class="lh d"><div><b>v10·DS=없음</b><span>복사(딜드)</span></div><div class="mv"><button onclick="mv(this,-1)">◀</button><button onclick="mv(this,1)">▶</button></div></div><div class="stack"><div class="cell" style="padding:20px;text-align:center;color:#999">없음</div></div></div><div class="lane"><div class="lh v"><div><b>v8</b><span>무참고·</span></div><div class="mv"><button onclick="mv(this,-1)">◀</button><button onclick="mv(this,1)">▶</button></div></div><div class="stack"></div></div><div class="lane"><div class="lh v"><div><b>v8-2</b><span>무신사영감·</span></div><div class="mv"><button onclick="mv(this,-1)">◀</button><button onclick="mv(this,1)">▶</button></div></div><div class="stack"></div></div><div class="lane"><div class="lh v"><div><b>v9</b><span>프리셋·</span></div><div class="mv"><button onclick="mv(this,-1)">◀</button><button onclick="mv(this,1)">▶</button></div></div><div class="stack"></div></div><div class="lane"><div class="lh p"><div><b>원본 제품 기둥</b><span>내 슬리퍼 raw</span></div><div class="mv"><button onclick="mv(this,-1)">◀</button><button onclick="mv(this,1)">▶</button></div></div><div class="stack"></div></div></div>
<script>function mv(b,d){var L=b.closest('.lane'),bd=document.getElementById('board'),a=[].slice.call(bd.children),i=a.indexOf(L),j=i+d;if(j<0||j>=a.length)return;d>0?bd.insertBefore(a[j],L):bd.insertBefore(L,a[j]);}</script>
</body></html>
