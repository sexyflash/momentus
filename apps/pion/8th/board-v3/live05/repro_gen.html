<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:570px; }
  body { font-family:'Pretendard',sans-serif; background:#fff; }
  .page { width:570px; background:#fcfcfd; }
  .photo { display:block; width:570px; }

  /* headline */
  .head { text-align:center; margin-top:-2px; }
  .head .l1 { font-size:34px; font-weight:500; color:#242424; line-height:46px; letter-spacing:-0.5px; }
  .head .l2 { font-size:34px; font-weight:700; color:#1f1f1f; line-height:46px; letter-spacing:-0.5px; }

  /* icon 3-col */
  .feat { width:450px; margin:74px auto 0; display:flex; }
  .feat .col { width:150px; text-align:center; }
  .feat .col + .col { border-left:1px solid #e2e4e9; }
  .feat .ic { height:44px; display:flex; align-items:center; justify-content:center; }
  .feat .label { margin-top:28px; font-size:18px; font-weight:700; color:#111; line-height:1; }
  .feat .sub { margin-top:10px; font-size:17px; font-weight:400; color:#565b66; line-height:1; letter-spacing:-0.3px; }

  /* body copy */
  .body-copy { margin-top:63px; text-align:center; font-size:17px; font-weight:400; color:#3c3c3c; line-height:32px; letter-spacing:-0.8px; }

  .tail { height:100px; background:#e8e9ee; margin-top:66px; }
</style>
</head>
<body>
<div class="page">
  <img class="photo" src="gen_photo.png" alt="">

  <div class="head">
    <div class="l1">양말, 이제 소모품이 아닌</div>
    <div class="l2">프리미엄 아이템으로</div>
  </div>

  <div class="feat">
    <div class="col">
      <div class="ic">
        <!-- fabric weave: crosshatch diagonal strokes -->
        <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
          <g stroke="#1f1f1f" stroke-width="2.6" stroke-linecap="round">
            <path d="M8 14 L15 7"/><path d="M18 14 L25 7"/><path d="M28 14 L35 7"/>
            <path d="M13 24 L20 17"/><path d="M23 24 L30 17"/><path d="M33 24 L40 17"/>
            <path d="M8 34 L15 27"/><path d="M18 34 L25 27"/><path d="M28 34 L35 27"/>
            <path d="M13 43 L20 36"/><path d="M23 43 L30 36"/>
          </g>
          <g stroke="#b9c0cc" stroke-width="2.6" stroke-linecap="round">
            <path d="M13 7 L20 14"/><path d="M23 7 L30 14"/><path d="M33 7 L40 14"/>
            <path d="M8 17 L15 24"/><path d="M18 17 L25 24"/><path d="M28 17 L35 24"/>
            <path d="M13 27 L20 34"/><path d="M23 27 L30 34"/><path d="M33 27 L40 34"/>
            <path d="M18 36 L25 43"/><path d="M28 36 L35 43"/>
          </g>
        </svg>
      </div>
      <div class="label">Fabric</div>
      <div class="sub">기능성 섬유</div>
    </div>
    <div class="col">
      <div class="ic">
        <!-- cushion: wavy verticals + dotted center + inward arrows -->
        <svg width="52" height="44" viewBox="0 0 52 44" fill="none">
          <g stroke="#1f1f1f" stroke-width="2.4" stroke-linecap="round" fill="none">
            <path d="M20 2 C15 9, 15 13, 19 22 C23 31, 22 36, 18 42"/>
            <path d="M32 2 C37 9, 37 13, 33 22 C29 31, 30 36, 34 42"/>
          </g>
          <g fill="#b9c0cc">
            <circle cx="26" cy="7" r="1.7"/><circle cx="26" cy="14" r="1.7"/>
            <circle cx="26" cy="21" r="1.7"/><circle cx="26" cy="28" r="1.7"/>
            <circle cx="26" cy="35" r="1.7"/>
          </g>
          <g stroke="#8b93a3" stroke-width="2.2" stroke-linecap="round">
            <path d="M2 21 L11 21"/><path d="M8 17.5 L11.5 21 L8 24.5" fill="none"/>
            <path d="M50 21 L41 21"/><path d="M44 17.5 L40.5 21 L44 24.5" fill="none"/>
          </g>
        </svg>
      </div>
      <div class="label">Cushion</div>
      <div class="sub">2중 파일 쿠션</div>
    </div>
    <div class="col">
      <div class="ic">
        <!-- size: circle + 4 outward arrows -->
        <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
          <circle cx="23" cy="23" r="20" stroke="#1f1f1f" stroke-width="2.6"/>
          <g stroke="#1f1f1f" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M19 19 L13.5 13.5"/><path d="M13.5 18 L13.5 13.5 L18 13.5"/>
            <path d="M27 19 L32.5 13.5"/><path d="M28 13.5 L32.5 13.5 L32.5 18"/>
            <path d="M19 27 L13.5 32.5"/><path d="M13.5 28 L13.5 32.5 L18 32.5"/>
            <path d="M27 27 L32.5 32.5"/><path d="M32.5 28 L32.5 32.5 L28 32.5"/>
          </g>
        </svg>
      </div>
      <div class="label">Size</div>
      <div class="sub">빅 사이즈 설계</div>
    </div>
  </div>

  <div class="body-copy">
    단순히 양말을 파는 것이 아닙니다.<br>
    발 건강, 편안함, 그리고 스타일까지 생각한<br>
    완벽한 솔루션을 제안합니다.
  </div>

  <div class="tail"></div>
</div>
</body>
</html>
