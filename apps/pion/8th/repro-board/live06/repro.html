<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:736px; }
  body { font-family:'Pretendard',sans-serif; }
  .page { position:relative; width:736px; height:1028px; background:#f8f6fb; overflow:hidden; }

  .top { text-align:center; }
  .chk { margin-top:76px; }
  .brand { margin-top:-3px; font-size:22px; font-weight:400; color:#58514b; letter-spacing:1.5px; }
  .h1 { margin-top:40px; font-size:34px; font-weight:400; color:#26211b; letter-spacing:-0.5px; line-height:1.2; }
  .h2 { margin-top:1px; font-size:48px; font-weight:700; color:#332a1e; letter-spacing:-2.5px; line-height:1.2; }
  .sub { margin-top:37px; font-size:21px; font-weight:400; color:#55504a; line-height:32px; letter-spacing:-0.5px; }
  .sub b { font-weight:700; color:#3a352f; }

  .list { position:absolute; left:103px; top:475px; width:150px; }
  .item:nth-child(2) { margin-top:43px; }
  .item:nth-child(3) { margin-top:37px; }
  .item .ic { height:32px; }
  .item .en { margin-top:13px; font-size:16px; font-weight:400; color:#8e8e90; letter-spacing:0.5px; line-height:19px; }
  .item .ko { margin-top:12px; font-size:25px; font-weight:700; color:#262628; letter-spacing:-1px; line-height:1; }

  .photo { position:absolute; left:245px; top:425px; width:455px; }
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <div class="chk">
      <!-- check in circle, tail escaping top-right -->
      <svg width="26" height="24" viewBox="0 0 26 24" fill="none">
        <path d="M20.5 5.5 A9.3 9.3 0 1 0 21.8 12.2" stroke="#3c332e" stroke-width="2.1" stroke-linecap="round"/>
        <path d="M8.5 10.5 L12.5 15.5 L23 2.5" stroke="#3c332e" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="brand">BRAND STORY</div>
    <div class="h1">우리 가구는 안전합니다.</div>
    <div class="h2">친환경목재 SEO를 사용합니다.</div>
    <div class="sub">
      우리 회사의강점이나 꼭 알아야할 이야기를적어주세요.<br>
      우리 제품을 소개하기,<b>이렇게 만들어 졌습니다.</b>
    </div>
  </div>

  <div class="list">
    <div class="item">
      <div class="ic">
        <!-- abacus -->
        <svg width="34" height="32" viewBox="0 0 34 32" fill="none" stroke="#4c4c4e" stroke-width="1.7">
          <path d="M6 3 V26" stroke-linecap="round"/>
          <path d="M28 3 V26" stroke-linecap="round"/>
          <path d="M6 3 H28"/>
          <path d="M6 10 H28"/><path d="M6 16 H28"/><path d="M6 22 H28"/>
          <circle cx="12" cy="10" r="2.6" fill="#f8f6fb"/><circle cx="17.5" cy="10" r="2.6" fill="#f8f6fb"/>
          <circle cx="15" cy="16" r="2.6" fill="#f8f6fb"/><circle cx="21" cy="16" r="2.6" fill="#f8f6fb"/>
          <circle cx="12" cy="22" r="2.6" fill="#f8f6fb"/>
          <path d="M2.5 29 H31.5" stroke-width="2.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="en">HIGH<br>QUALITY</div>
      <div class="ko">하이퀄리티</div>
    </div>
    <div class="item">
      <div class="ic">
        <!-- two test tubes -->
        <svg width="30" height="32" viewBox="0 0 30 32" fill="none" stroke="#4c4c4e" stroke-width="1.6">
          <path d="M3 2.5 H12" stroke-width="2.3" stroke-linecap="round"/>
          <path d="M4.7 3 V25.5 A2.8 2.8 0 0 0 10.3 25.5 V3"/>
          <path d="M4.7 20.5 H10.3"/>
          <path d="M17 2.5 H26" stroke-width="2.3" stroke-linecap="round"/>
          <path d="M18.7 3 V25.5 A2.8 2.8 0 0 0 24.3 25.5 V3"/>
          <path d="M18.7 20.5 H24.3"/>
        </svg>
      </div>
      <div class="en">HIGH<br>QUALITY</div>
      <div class="ko">하이퀄리티</div>
    </div>
    <div class="item">
      <div class="ic">
        <!-- tilted thermometer + degree -->
        <svg width="36" height="32" viewBox="0 0 36 32" fill="none" stroke="#4c4c4e" stroke-width="1.6">
          <g transform="rotate(45 14 20)">
            <rect x="10.5" y="6" width="7" height="24" rx="3.5"/>
            <circle cx="14" cy="12" r="1" fill="#4c4c4e" stroke="none"/>
            <circle cx="14" cy="16" r="1" fill="#4c4c4e" stroke="none"/>
            <circle cx="14" cy="20" r="1" fill="#4c4c4e" stroke="none"/>
            <circle cx="14" cy="24" r="1" fill="#4c4c4e" stroke="none"/>
            <path d="M14 6 V2" stroke-linecap="round"/>
          </g>
          <path d="M25 8 A4.5 4.5 0 1 1 20.5 3.6" stroke-linecap="round"/>
          <circle cx="27" cy="2.8" r="1.8"/>
        </svg>
      </div>
      <div class="en">HIGH<br>QUALITY</div>
      <div class="ko">하이퀄리티</div>
    </div>
  </div>

  <img class="photo" src="photo.png" alt="">
</div>
</body>
</html>
