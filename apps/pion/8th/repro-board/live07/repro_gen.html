<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Poppins',sans-serif; }
  .page { position:relative; width:2205px; height:3920px; overflow:hidden; background:#8d7c6a; }

  /* upper gradient zone (typography) */
  .bg-top { position:absolute; left:0; top:0; width:2205px; height:2112px;
    background:
      radial-gradient(ellipse 85% 110% at 42% 112%, rgba(255,246,232,0.65) 0%, rgba(255,246,232,0.30) 55%, rgba(255,246,232,0) 85%),
      linear-gradient(90deg, rgba(45,32,20,0) 55%, rgba(45,32,20,0.16) 100%),
      linear-gradient(180deg, #a3917d 0%, #a5947c 100%);
  }
  /* lower floor zone */
  .bg-bottom { position:absolute; left:0; top:3158px; width:2205px; height:762px;
    background:
      radial-gradient(ellipse 55% 48% at 51% -6%, rgba(255,240,224,0.22), rgba(255,240,224,0) 70%),
      #8d7c6a;
  }
  .chair { position:absolute; left:0; top:2112px; width:2205px; }

  .typo { position:absolute; left:0; top:0; width:2205px; text-align:center; color:#fff; }
  .url { position:absolute; top:377px; width:100%; font-weight:300; font-size:43px; letter-spacing:1.5px; color:rgba(255,255,255,0.85); }
  .festival { position:absolute; top:752px; width:100%; font-weight:400; font-size:90px; letter-spacing:1px; }
  .big80 { position:absolute; top:795px; width:100%; font-family:'Playfair Display',serif; font-weight:400; font-size:520px; line-height:1; letter-spacing:-5px; }
  .upto { position:absolute; top:1360px; left:976px; width:212px; height:74px; border:2px solid rgba(255,255,255,0.75);
          transform:rotate(-4deg); display:flex; align-items:center; justify-content:center;
          font-size:46px; font-weight:400; color:#fff; }
  .off { position:absolute; top:1309px; left:-37px; width:100%; font-family:'Playfair Display',serif; font-weight:400; font-size:620px; line-height:1; letter-spacing:22px; }
  .onprem { position:absolute; top:1943px; width:100%; font-weight:500; font-size:77px; line-height:90px; letter-spacing:0px; }

  /* outline bar with 3 groups */
  .pillbar { position:absolute; left:451px; top:3130px; width:1300px; height:101px;
    border:2px solid rgba(255,255,255,0.75); border-radius:4px;
    display:flex; align-items:center; justify-content:space-between; padding:0 30px; }
  .pill { display:flex; align-items:center; gap:14px; color:#fff; font-size:40px; font-weight:400; white-space:nowrap; }
  .pill svg { display:block; }

  /* footer */
  .footer { position:absolute; left:178px; top:3418px; width:1849px; height:369px; background:#fff; border-radius:8px;
    display:flex; align-items:center; color:#6b5138; }
  .logo { width:565px; display:flex; flex-direction:column; align-items:center; }
  .logo .name { margin-top:22px; font-size:56px; font-weight:500; letter-spacing:4px; line-height:1; color:#6b5138; }
  .logo .home { margin-top:12px; font-size:42px; font-weight:500; letter-spacing:5px; line-height:1; color:#6b5138;
    display:flex; align-items:center; gap:14px; }
  .logo .home::before, .logo .home::after { content:''; width:52px; height:3px; background:#6b5138; }
  .vdiv { width:2px; height:220px; background:#e2dbd1; }
  .addr { flex:1; padding-left:118px; margin-top:14px; }
  .addr .l1 { font-size:50px; font-weight:600; line-height:1; }
  .addr .l2 { margin-top:14px; font-size:41px; font-weight:400; line-height:1; }
  .addr .l3 { margin-top:16px; font-size:47px; font-weight:600; line-height:1; display:flex; align-items:center; gap:14px; }
  .badgewrap { width:580px; display:flex; justify-content:center; }
  .badgewrap img { width:274px; }
</style>
</head>
<body>
<div class="page">
  <div class="bg-top"></div>
  <img class="chair" src="gen_chair.png" alt="">
  <div class="bg-bottom"></div>

  <div class="typo">
    <div class="url">www.aiswaryahome.com</div>
    <div class="festival">Festival Special Offer</div>
    <div class="big80">80%</div>
    <div class="off">Off</div>
    <div class="upto">Up to</div>
    <div class="onprem">On&nbsp; Premium Displayed<br>Furniture</div>
  </div>

  <div class="pillbar">
    <div class="pill">
      <svg width="46" height="40" viewBox="0 0 52 46" fill="none" stroke="#fff" stroke-width="2.4" stroke-linejoin="round">
        <path d="M10 4 H42 L50 16 L26 43 L2 16 Z"/>
        <path d="M2 16 H50"/><path d="M18 4 L15 16 L26 43 L37 16 L34 4"/>
      </svg>
      <span>Elegant Designs</span>
    </div>
    <div class="pill">
      <svg width="46" height="40" viewBox="0 0 54 46" fill="none" stroke="#fff" stroke-width="2.6" stroke-linejoin="round">
        <path d="M4 12 L11 34 H43 L50 12 L38 22 L27 8 L16 22 Z"/>
        <path d="M11 40 H43"/>
      </svg>
      <span>Premium Quality</span>
    </div>
    <div class="pill">
      <svg width="44" height="44" viewBox="0 0 48 48" fill="none" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 8 H30 L27 12 H23 Z"/>
        <path d="M23 12 C17 16 15 21 16 25 C17 29 20.5 31 25 31 C29.5 31 33 29 34 25 C35 21 33 16 27 12"/>
        <path d="M25 16.5 v9.5 M22 18.5 h6 M22 22.5 h6"/>
        <path d="M6 38 C12 34 18 35 24 38 H32 C35 38 35 42 32 42 H22"/>
        <path d="M32 42 L41 37 C44 35.5 46 39 43.5 40.8 L34 46 C29 48 24 47 19 45 L6 42"/>
      </svg>
      <span>Festive Savings</span>
    </div>
  </div>

  <div class="footer">
    <div class="logo">
      <svg width="104" height="104" viewBox="0 0 112 112" fill="none" stroke="#6b5138">
        <circle cx="56" cy="56" r="50" stroke-width="5"/>
        <path d="M38 78 L52 34 C53 30 59 30 60 34 L74 78" stroke-width="6" stroke-linecap="round"/>
        <path d="M42 62 H74" stroke-width="6" stroke-linecap="round"/>
      </svg>
      <div class="name">AISWARYA</div>
      <div class="home">HOME</div>
    </div>
    <div class="vdiv"></div>
    <div class="addr">
      <div class="l1">Aiswarya Home</div>
      <div class="l2">Maloram, Thamarassery</div>
      <div class="l3">
        <svg width="42" height="42" viewBox="0 0 44 44" fill="none" stroke="#6b5138" stroke-width="3">
          <circle cx="22" cy="22" r="19"/>
          <path d="M14 13 C13 13 12 15 13 18 C15 24 20 29 26 31 C29 32 31 31 31 30 L31 26 L26 24 L24 26 C21 25 19 23 18 20 L20 18 L18 13 Z" fill="#6b5138" stroke="none"/>
        </svg>
        <span>+91 7034 026 662</span>
      </div>
    </div>
    <div class="vdiv"></div>
    <div class="badgewrap">
      <!-- Festival Sale badge: drawn directly in SVG (graphic asset, t2i prohibited) -->
      <svg width="274" height="297" viewBox="0 0 274 297" font-family="Poppins,sans-serif">
        <defs>
          <radialGradient id="bcard" cx="50%" cy="36%" r="80%">
            <stop offset="0%" stop-color="#ffdd66"/>
            <stop offset="55%" stop-color="#fdb92d"/>
            <stop offset="100%" stop-color="#f68b1f"/>
          </radialGradient>
          <linearGradient id="bgold" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff3c2"/>
            <stop offset="45%" stop-color="#ffd23e"/>
            <stop offset="100%" stop-color="#f6921e"/>
          </linearGradient>
          <linearGradient id="bwhite" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e4ddd2"/>
          </linearGradient>
          <pattern id="bdots" width="12" height="12" patternUnits="userSpaceOnUse">
            <circle cx="3" cy="3" r="2.1" fill="#f6a21e"/>
          </pattern>
        </defs>

        <!-- halftone dot fields -->
        <rect x="176" y="66" width="98" height="196" rx="42" fill="url(#bdots)"/>
        <rect x="6" y="226" width="72" height="48" rx="22" fill="url(#bdots)"/>

        <!-- gradient card -->
        <g transform="rotate(-2 137 162)">
          <rect x="30" y="60" width="214" height="202" rx="34" fill="url(#bcard)"/>
          <rect x="37" y="67" width="200" height="188" rx="28" fill="none" stroke="#ffe08a" stroke-width="2" opacity="0.85"/>
        </g>

        <!-- umbrella -->
        <g>
          <path d="M79 18 L63 80" stroke="#f6a21e" stroke-width="4.2" stroke-linecap="round"/>
          <path d="M63 80 a6.5 6.5 0 0 0 12.5 3.5" stroke="#f6a21e" stroke-width="4.2" fill="none" stroke-linecap="round"/>
          <circle cx="80" cy="13" r="3.6" fill="#5b2d8e"/>
          <path d="M19 54 C23 25 49 8 79 15 C109 8 135 25 139 54
                   a10 8 0 0 1 -20 0 a10 8 0 0 1 -20 0 a10 8 0 0 1 -20 0
                   a10 8 0 0 1 -20 0 a10 8 0 0 1 -20 0 a10 8 0 0 1 -20 0 Z" fill="#7d3f98"/>
          <path d="M79 15 C60 24 50 38 49 54 M79 15 C98 24 108 38 109 54"
                stroke="#9a5fb5" stroke-width="2" fill="none" opacity="0.9"/>
          <g fill="#c5e86c">
            <circle cx="29" cy="56" r="2.6"/><circle cx="49" cy="58" r="2.6"/><circle cx="69" cy="59" r="2.6"/>
            <circle cx="89" cy="59" r="2.6"/><circle cx="109" cy="58" r="2.6"/><circle cx="129" cy="56" r="2.6"/>
          </g>
        </g>

        <!-- brand line -->
        <text x="141" y="96" text-anchor="middle" font-size="15" font-weight="700" letter-spacing="2" fill="#4a2a6b">AISWARYA</text>
        <path d="M92 105 H106 M176 105 H190" stroke="#4a2a6b" stroke-width="1.4"/>
        <text x="141" y="109" text-anchor="middle" font-size="9" font-weight="600" letter-spacing="4" fill="#4a2a6b">FURNITURE</text>

        <!-- 3D headline -->
        <g font-style="italic" font-weight="700" text-anchor="middle" paint-order="stroke">
          <text x="137" y="148" font-size="32" fill="#99261b" transform="translate(0,3)">FURNITURE</text>
          <text x="137" y="148" font-size="32" fill="url(#bgold)" stroke="#fff" stroke-width="1.6">FURNITURE</text>
          <text x="137" y="187" font-size="37" fill="#99261b" transform="translate(0,3)">FESTIVAL</text>
          <text x="137" y="187" font-size="37" fill="url(#bgold)" stroke="#fff" stroke-width="1.7">FESTIVAL</text>
          <text x="137" y="228" font-size="41" fill="#99261b" transform="translate(0,3.5)">SALE</text>
          <text x="137" y="228" font-size="41" fill="url(#bwhite)" stroke="#fff" stroke-width="1">SALE</text>
        </g>

        <!-- date ribbon -->
        <g>
          <path d="M56 244 L38 252 L56 260 Z" fill="#d94b3f"/>
          <path d="M218 244 L236 252 L218 260 Z" fill="#d94b3f"/>
          <path d="M56 240 L56 264 L62 258 Z" fill="#8c1d12"/>
          <path d="M218 240 L218 264 L212 258 Z" fill="#8c1d12"/>
          <rect x="60" y="238" width="154" height="28" rx="3" fill="#c1272d"/>
          <text x="137" y="257" text-anchor="middle" font-size="13.5" font-weight="600" fill="#fff">15th AUG - 30th SEP</text>
        </g>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
